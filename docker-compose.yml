services:
  test_task:
    image: "arthurkhayretdinov01/test_task"
    container_name: test_task
    ports:
      - "8080:8080"
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: your_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  app:
    build: .
    depends_on:
      - postgres
      - rabbitmq
      - redis
    ports:
      - "8080:8080"
    environment:
      DATASOURCE_URL: jdbc:postgresql://localhost:5432/test_task
      DATASOURCE_USERNAME: postgres
      DATASOURCE_PASSWORD: 998845
      RABBITMQ_HOST: rabbitmq
      REDIS_HOST: redis

volumes:
  pg_data: